<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Oana & Cosmin</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

<style>

html{
scroll-behavior:smooth;
}

body{
margin:0;
padding:0;
background:#f7f3ed;
color:#2f2f2f;
font-family:'Montserrat',sans-serif;
text-align:center;
}

section{
padding:120px 25px;
}

.hero{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.monograma{
font-family:'Cormorant Garamond',serif;
font-size:42px;
letter-spacing:8px;
color:#c8a96b;
margin-bottom:25px;
}

.hero h1{
font-family:'Great Vibes',cursive;
font-size:95px;
font-weight:400;
margin:0;
}

.hero p{
letter-spacing:3px;
font-size:20px;
margin-top:20px;
}

.line{
width:140px;
height:1px;
background:#c8a96b;
margin:40px auto;
}

h2{
font-family:'Cormorant Garamond',serif;
font-size:58px;
font-weight:400;
margin-bottom:25px;
}

.text{
max-width:850px;
margin:auto;
line-height:1.9;
font-size:20px;
}

.poza-miri{
width:90%;
max-width:750px;
border-radius:12px;
box-shadow:0 15px 40px rgba(0,0,0,0.15);
}

.fade{
opacity:0;
transform:translateY(40px);
transition:1s;
}

.fade.show{
opacity:1;
transform:none;
}

</style>
</head>

<body>

<section class="hero">

<div class="fade">

<div class="monograma">
O ♥ C
</div>

<h1>Oana & Cosmin</h1>

<div class="line"></div>

<p>
INVITAȚIE DE NUNTĂ
<br><br>
05 Septembrie 2026
</p>

</div>

</section>

<section>

<div class="fade">

<h2>Invitație</h2>

<div class="text">

Cu bucurie în suflet și emoție în inimă,
vă invităm să fiți alături de noi
în cea mai frumoasă zi a vieții noastre.

</div>

</div>

</section>

<section>

<div class="fade">

<img src="images/poza_noastra.jpg" class="poza-miri">

</div>

</section>
